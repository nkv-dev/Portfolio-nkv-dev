<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Typing Video Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="sheet.css">
</head>

<body>

  <!-- HERO SECTION -->
  <section class="hero-section">

    <!-- Background Video -->
    <video id="bgVideo" class="bg-video" autoplay muted playsinline>
      <source src="assets/videoplayback.mp4" type="video/mp4">
    </video>

    <!-- Hero Content -->
    <div class="container hero text-center">
      <div>
        <h1 class="fw-bold mb-3">
          Hi, <span class="text-warning">Nitesh Kumar Verma</span> here
        </h1>

        <h3>
          I am a <span class="typing" id="typing"></span><span class="cursor"></span>
        </h3>

        <p class="mt-4 opacity-75">
          Passionate about building modern web apps and hardware-powered solutions.
        </p>

        <button class="btn btn-outline-info mt-3 px-4">
          Explore My Work
        </button>
      </div>
    </div>

  </section>

  <!-- ABOUT -->
  <section class="section">
    <div class="container">
      <h2>About Me</h2>
      <p>Scroll down — the background video is gone now.</p>
    </div>
  </section>

  <!-- PROJECTS -->
  <section class="section">
    <div class="container">
      <h2>Projects</h2>
      <p>Here are some of my projects...</p>
    </div>
  </section>

  <!-- CONTACT -->
  <section class="section">
    <div class="container">
      <h2>Contact</h2>
      <p>Get in touch with me.</p>
    </div>
  </section>


  <!-- TYPING + VIDEO CONTROL SCRIPT -->
  <script>
    const words = [
      "Coder",
      "Web Developer",
      "Tinker",
      "Embedded Systems Enthusiast",
      "Biker",
      "MotorSports fan",
      "Hobbist",
    ];

    let wordIndex = 0;
    let charIndex = 0;
    let isDeleting = false;
    const typingSpeed = 130;
    const deletingSpeed = 50;
    const delayBetweenWords = 140;

    const typingElement = document.getElementById("typing");

    function typeEffect() {
      const currentWord = words[wordIndex];

      if (!isDeleting) {
        typingElement.textContent = currentWord.substring(0, charIndex + 1);
        charIndex++;

        if (charIndex === currentWord.length) {
          setTimeout(() => (isDeleting = true), delayBetweenWords);
        }
      } else {
        typingElement.textContent = currentWord.substring(0, charIndex - 1);
        charIndex--;

        if (charIndex === 0) {
          isDeleting = false;
          wordIndex = (wordIndex + 1) % words.length;
        }
      }

      setTimeout(typeEffect, isDeleting ? deletingSpeed : typingSpeed);
    }

    typeEffect();


    /* Video loop from 0s to 42s */
    const video = document.getElementById("bgVideo");
    const startTime = 0;
    const endTime = 42;

    video.currentTime = startTime;
    video.play();

    video.addEventListener("timeupdate", () => {
      if (video.currentTime >= endTime) {
        video.currentTime = startTime;
        video.play();
      }
    });
  </script>

</body>
</html>
