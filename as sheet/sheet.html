<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Typing Effect Video Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    /* Reset + Base */
    body {
      margin: 0;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      overflow-x: hidden;
      background: #000;
    }

    /* HERO SECTION */
    .hero-section {
      position: relative;
      height: 100vh;
      overflow: hidden;
    }

    /* Background Video (only in hero) */
    .bg-video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
    }

    /* Dark overlay for readability */
    .hero-section::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: -1;
    }

    /* Hero content */
    .hero {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Normal sections */
    .section {
      min-height: 100vh;
      padding: 120px 0;
      background: #111;
    }

    .section:nth-child(even) {
      background: #1a1a1a;
    }

    /* Typing text */
    .typing {
      color: #00ffd5;
      font-weight: 600;
    }

    /* Cursor animation */
    .cursor {
      display: inline-block;
      width: 2px;
      height: 1.2em;
      background-color: #00ffd5;
      margin-left: 5px;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 50%, 100% { opacity: 1; }
      25%, 75% { opacity: 0; }
    }
  </style>
</head>

<body>

  <!-- HERO SECTION -->
  <section class="hero-section">

    <!-- Background Video -->
    <video class="bg-video" autoplay muted loop playsinline>
      <source src="assets/videoplayback.mp4" type="video/mp4">
    </video>

    <!-- Hero Content -->
    <div class="container hero text-center">
      <div>
        <h1 class="fw-bold mb-3">
          Hi, <span class="text-warning">Nitesh Kumar Verma</span> here
        </h1>

        <h3>
          I am a <span class="typing" id="typing"></span><span class="cursor"></span>
        </h3>

        <p class="mt-4 opacity-75">
          Passionate about building modern web apps and hardware-powered solutions.
        </p>

        <button class="btn btn-outline-info mt-3 px-4">
          Explore My Work
        </button>
      </div>
    </div>

  </section>

  <!-- ABOUT SECTION -->
  <section class="section">
    <div class="container">
      <h2>About Me</h2>
      <p>
        This is the next section. When you scroll here, the background video is gone.
      </p>
    </div>
  </section>

  <!-- PROJECTS SECTION -->
  <section class="section">
    <div class="container">
      <h2>Projects</h2>
      <p>Here are some of my projects...</p>
    </div>
  </section>

  <!-- CONTACT SECTION -->
  <section class="section">
    <div class="container">
      <h2>Contact</h2>
      <p>Get in touch with me.</p>
    </div>
  </section>

  <!-- Typing Effect Script -->
  <script>
    const words = ["Developer", "Designer", "Creator", "Engineer"];
    let i = 0, j = 0, isDeleting = false;
    const typingElement = document.getElementById("typing");

    function typeEffect() {
      const currentWord = words[i];

      if (!isDeleting) {
        typingElement.textContent = currentWord.substring(0, j + 1);
        j++;
        if (j === currentWord.length) {
          isDeleting = true;
        }
      } else {
        typingElement.textContent = currentWord.substring(0, j - 1);
        j--;
        if (j === 0) {
          isDeleting = false;
          i = (i + 1) % words.length;
        }
      }

      setTimeout(typeEffect, isDeleting ? 80 : 120);
    }

    typeEffect();
  </script>

</body>
</html>
