<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Typing Effect Portfolio</title>

  <!-- Bootstrap 5 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      height: 100vh;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
    }

    .hero {
      height: 100vh;
    }

    .typing {
      color: #00ffd5;
      font-weight: 600;
    }

    .cursor {
      display: inline-block;
      width: 2px;
      background-color: #00ffd5;
      margin-left: 5px;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 50%, 100% { opacity: 1; }
      25%, 75% { opacity: 0; }
    }
  </style>
</head>

<body>
  <div class="container hero d-flex align-items-center justify-content-center">
    <div class="text-center">
      <h1 class="fw-bold mb-3">
        Hi, <span class="text-warning">Nitesh Kumar Verma</span> here
      </h1>

      <h3>
        I am a <span class="typing" id="typing"></span><span class="cursor"></span>
      </h3>

      <p class="mt-4 text-light opacity-75">
        Passionate about building modern web apps and hardware-powered solutions.
      </p>

      <button class="btn btn-outline-info mt-3 px-4">
        Explore My Work
      </button>
    </div>
  </div>

  <script>
    const words = [
      "Coder",
      "Web Developer",
      "Tinker",
      "Embedded Systems Enthusiast",
      "Biker",
      "MotorSports fan",
      "Hobbist"
    ];

    let wordIndex = 0;
    let charIndex = 0;
    let isDeleting = false;
    const typingSpeed = 130;
    const deletingSpeed = 50;
    const delayBetweenWords = 140;

    const typingElement = document.getElementById("typing");

    function typeEffect() {
      const currentWord = words[wordIndex];

      if (!isDeleting) {
        typingElement.textContent = currentWord.substring(0, charIndex + 1);
        charIndex++;

        if (charIndex === currentWord.length) {
          setTimeout(() => isDeleting = true, delayBetweenWords);
        }
      } else {
        typingElement.textContent = currentWord.substring(0, charIndex - 1);
        charIndex--;

        if (charIndex === 0) {
          isDeleting = false;
          wordIndex = (wordIndex + 1) % words.length;
        }
      }

      setTimeout(
        typeEffect,
        isDeleting ? deletingSpeed : typingSpeed
      );
    }

    typeEffect();
  </script>
</body>
</html>
