<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Island Navbar</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    min-height: 200vh;
    color: white;
}

/* Island Navbar */
.island-nav-wrapper {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 1000;
}

.island-navbar {
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-radius: 999px;
    padding: 10px 26px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.25);
    border: 1px solid rgba(255,255,255,0.25);
}

.nav-link, .navbar-brand {
    color: white !important;
    font-weight: 500;
}

.nav-link:hover {
    color: #00ffe1 !important;
}

/* Mobile pill look */
@media (max-width: 768px) {
    .island-navbar {
        padding: 10px 18px;
        border-radius: 24px;
    }
}
</style>
</head>

<body>

<!-- Island Navbar -->
<div class="island-nav-wrapper">
  <nav class="navbar navbar-expand-lg island-navbar">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">IslandUI</a>

      <button class="navbar-toggler text-white" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        ☰
      </button>

      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto gap-3">
          <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Features</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Pricing</a></li>
          <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
        </ul>
      </div>
    </div>
  </nav>
</div>

<!-- Page Content -->
<div class="container text-center" style="padding-top:140px">
  <h1>Floating Island Navbar</h1>
  <p>Scroll and enjoy the island effect</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
